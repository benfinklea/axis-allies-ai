<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Axis &amp; Allies — AI Table</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #14161b; --panel: #1d2128; --panel2: #242a33; --ink: #d7dae0;
    --dim: #8b93a0; --line: #323a45;
    --germany: #8a93a5; --japan: #d98032; --uk: #b08d57;
    --ussr: #c0504d; --usa: #6b8e4e;
    --axis: #c0504d; --allies: #5b84b1;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
         font: 14px/1.45 -apple-system, "Helvetica Neue", sans-serif; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .08em;
       color: var(--dim); margin: 0 0 8px; }
  #top { display: flex; gap: 18px; align-items: baseline; flex-wrap: wrap;
         padding: 12px 16px; background: var(--panel);
         border-bottom: 1px solid var(--line);
         position: sticky; top: 0; z-index: 5; }
  #top .big { font-size: 18px; font-weight: 600; }
  #top .dim { color: var(--dim); }
  #econbar { flex: 1; min-width: 180px; max-width: 360px; height: 10px;
             background: var(--panel2); border-radius: 5px; overflow: hidden;
             align-self: center; }
  #econfill { height: 100%; background: var(--axis); width: 0%; }
  main { padding: 14px 16px 40px; display: grid; gap: 16px; }
  /* country cards */
  #powers { display: grid; gap: 12px;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
  .power { background: var(--panel); border: 1px solid var(--line);
           border-top: 4px solid var(--pc, var(--dim));
           border-radius: 8px; padding: 10px 12px; cursor: pointer; }
  .power.active { outline: 2px solid #e8c35a; }
  .power.eliminated { opacity: .45; }
  .power header { display: flex; justify-content: space-between;
                  align-items: baseline; }
  .power .name { font-weight: 700; font-size: 15px; text-transform: capitalize; }
  .chip { font-size: 11px; padding: 1px 8px; border-radius: 9px;
          background: var(--panel2); color: var(--dim);
          border: 1px solid var(--line); white-space: nowrap; }
  .stats { display: flex; gap: 12px; margin: 6px 0; color: var(--dim);
           font-size: 12px; flex-wrap: wrap; }
  .stats b { color: var(--ink); }
  .thought { background: var(--panel2); border-radius: 6px; padding: 8px;
             font-size: 12.5px; max-height: 132px; overflow-y: auto;
             white-space: pre-wrap; }
  .thought:empty::before { content: "no thoughts yet"; color: var(--dim); }
  .cap-lost { color: var(--axis); font-weight: 600; }
  /* two-column: council + transcript */
  #channels { display: grid; gap: 16px;
              grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
  .panel { background: var(--panel); border: 1px solid var(--line);
           border-radius: 8px; padding: 12px; }
  .feed { max-height: 300px; overflow-y: auto; font-size: 12.5px;
          display: flex; flex-direction: column; gap: 6px; }
  .feed .note { background: var(--panel2); border-radius: 6px; padding: 6px 8px; }
  .feed .note .who { font-weight: 700; text-transform: capitalize; }
  /* board */
  #filters button { background: var(--panel2); color: var(--ink);
                    border: 1px solid var(--line); border-radius: 6px;
                    padding: 3px 12px; margin-right: 6px; cursor: pointer;
                    font-size: 12px; }
  #filters button.on { background: #3a4250; border-color: #5b84b1; }
  #board { display: grid; gap: 8px; margin-top: 10px;
           grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
  .terr { background: var(--panel); border: 1px solid var(--line);
          border-left: 4px solid var(--tc, var(--line));
          border-radius: 6px; padding: 6px 9px; font-size: 12px; }
  .terr.water { background: #1a2430; }
  .terr.contested { border-color: #e8c35a; }
  .terr .tname { font-weight: 600; }
  .terr .who { color: var(--dim); }
  .terr .u { margin-top: 2px; }
  .terr .u b { text-transform: capitalize; }
  /* comms drawer */
  #drawer { position: fixed; top: 0; right: 0; width: min(560px, 92vw);
            height: 100vh; background: var(--panel); z-index: 10;
            border-left: 1px solid var(--line); display: none;
            flex-direction: column; }
  #drawer.open { display: flex; }
  #drawer header { padding: 12px 16px; border-bottom: 1px solid var(--line);
                   display: flex; justify-content: space-between;
                   align-items: center; }
  #drawer header .t { font-weight: 700; text-transform: capitalize; }
  #drawer header button { background: none; border: none; color: var(--dim);
                          font-size: 22px; cursor: pointer; }
  #convo { flex: 1; overflow-y: auto; padding: 14px; display: flex;
           flex-direction: column; gap: 10px; }
  .msg { border-radius: 8px; padding: 8px 10px; font-size: 12.5px;
         white-space: pre-wrap; word-break: break-word; max-width: 94%; }
  .msg .tag { font-size: 10px; text-transform: uppercase; letter-spacing: .07em;
              color: var(--dim); margin-bottom: 3px; }
  .msg.user { background: var(--panel2); align-self: flex-start; }
  .msg.assistant { background: #2b3442; align-self: flex-end; }
  .msg.system { background: #222; align-self: stretch; color: var(--dim);
                max-height: 90px; overflow-y: auto; }
  #status { color: var(--dim); font-size: 12px; }
</style>
</head>
<body>
<div id="top">
  <span class="big" id="roundline">—</span>
  <span class="dim" id="phaseline"></span>
  <span class="dim">Axis income <b id="axinc">0</b> · Allies income <b id="alinc">0</b></span>
  <div id="econbar" title="Axis economic-victory progress"><div id="econfill"></div></div>
  <span id="status"></span>
</div>
<main>
  <section>
    <h2>The Powers — click a card for that AI's full comms</h2>
    <div id="powers"></div>
  </section>
  <div id="channels">
    <div class="panel">
      <h2>Allied war council</h2>
      <div class="feed" id="allies-notes"></div>
    </div>
    <div class="panel">
      <h2>Axis war council</h2>
      <div class="feed" id="axis-notes"></div>
    </div>
    <div class="panel">
      <h2>Table transcript (spoken)</h2>
      <div class="feed" id="transcript"></div>
    </div>
  </div>
  <section>
    <h2>Board</h2>
    <div id="filters">
      <button data-f="units" class="on">With units</button>
      <button data-f="contested">Contested</button>
      <button data-f="all">Everything</button>
    </div>
    <div id="board"></div>
  </section>
</main>
<div id="drawer">
  <header>
    <span class="t" id="drawer-title"></span>
    <button onclick="closeDrawer()">×</button>
  </header>
  <div id="convo"></div>
</div>
<script>
const COLORS = {germany:"var(--germany)", japan:"var(--japan)", uk:"var(--uk)",
                ussr:"var(--ussr)", usa:"var(--usa)"};
let data = null, filter = "units", openPower = null;

const esc = s => String(s ?? "").replace(/[&<>"]/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function render() {
  if (!data) return;
  if (data.no_game) {
    document.getElementById("roundline").textContent = "No game in progress";
    return;
  }
  document.getElementById("roundline").textContent =
    `Round ${data.round} — ${data.turn.toUpperCase()} to play`;
  document.getElementById("phaseline").textContent = `phase: ${data.phase}`;
  document.getElementById("axinc").textContent = data.axis_income;
  document.getElementById("alinc").textContent = data.allies_income;
  if (data.econ_threshold) {
    document.getElementById("econfill").style.width =
      Math.min(100, 100 * data.axis_income / data.econ_threshold) + "%";
    document.getElementById("econbar").title =
      `Axis economic victory at ${data.econ_threshold} income`;
  }

  // power cards
  document.getElementById("powers").innerHTML = data.powers.map(p => `
    <div class="power ${p.power === data.turn ? "active" : ""}
                ${p.eliminated ? "eliminated" : ""}"
         style="--pc:${COLORS[p.power]}" onclick="openDrawer('${p.power}')">
      <header>
        <span class="name">${p.power}</span>
        <span class="chip">${esc(p.model)} · ${esc(p.provider)}</span>
      </header>
      <div class="stats">
        <span>side <b>${p.side}</b></span>
        <span>treasury <b>${p.ipcs}</b></span>
        <span>income <b>${p.income}</b></span>
        <span>voice <b>${esc(p.voice)}</b></span>
        ${p.tech.length ? `<span>tech <b>${p.tech.join(", ")}</b></span>` : ""}
        ${p.capital_owner !== p.power
          ? `<span class="cap-lost">capital ${esc(p.capital)} LOST to ${esc(p.capital_owner)}</span>`
          : ""}
      </div>
      <div class="thought">${esc(p.last_thought)}</div>
    </div>`).join("");

  // war councils
  for (const side of ["allies", "axis"]) {
    const el = document.getElementById(side + "-notes");
    const notes = (data.council[side] || []);
    el.innerHTML = notes.length
      ? notes.map(n => {
          const i = n.indexOf(": ");
          return `<div class="note"><span class="who">${esc(n.slice(0, i))}:</span> ${esc(n.slice(i + 2))}</div>`;
        }).join("")
      : `<div class="note">no notes yet</div>`;
    el.scrollTop = el.scrollHeight;
  }

  // transcript
  const tr = document.getElementById("transcript");
  const stick = tr.scrollHeight - tr.scrollTop - tr.clientHeight < 40;
  tr.innerHTML = data.transcript.map(l => `<div class="note">${esc(l)}</div>`).join("");
  if (stick) tr.scrollTop = tr.scrollHeight;

  // board
  const terrs = data.territories.filter(t =>
    filter === "all" ? true :
    filter === "contested" ? t.contested :
    Object.keys(t.units).length > 0);
  document.getElementById("board").innerHTML = terrs.map(t => `
    <div class="terr ${t.water ? "water" : ""} ${t.contested ? "contested" : ""}"
         style="--tc:${COLORS[t.owner] || "var(--line)"}">
      <div class="tname">${esc(t.name)} ${t.ipc ? `<span class="who">(${t.ipc})</span>` : ""}</div>
      <div class="who">${t.owner ? "owned by " + t.owner : "sea zone"}${t.contested ? " — CONTESTED" : ""}</div>
      ${Object.entries(t.units).map(([p, us]) =>
        `<div class="u"><b style="color:${COLORS[p]}">${p}</b>: ` +
        Object.entries(us).map(([u, n]) => `${n} ${u}`).join(", ") + `</div>`).join("")}
    </div>`).join("");

  // keep an open drawer fresh
  if (openPower) fillDrawer();
}

function openDrawer(power) { openPower = power; fillDrawer();
  document.getElementById("drawer").classList.add("open"); }
function closeDrawer() { openPower = null;
  document.getElementById("drawer").classList.remove("open"); }

function fillDrawer() {
  const p = data.powers.find(x => x.power === openPower);
  if (!p) return;
  document.getElementById("drawer-title").textContent =
    `${p.power} — ${p.model} (${p.provider})`;
  const convo = document.getElementById("convo");
  const stick = convo.scrollHeight - convo.scrollTop - convo.clientHeight < 60;
  convo.innerHTML = p.history.map(m => `
    <div class="msg ${esc(m.role)}">
      <div class="tag">${m.role === "user" ? "engine → " + p.power
                        : m.role === "assistant" ? p.power + " replies"
                        : "system briefing"}</div>${esc(m.content)}
    </div>`).join("") || `<div class="msg system">no conversation yet</div>`;
  if (stick) convo.scrollTop = convo.scrollHeight;
}

document.getElementById("filters").addEventListener("click", e => {
  if (!e.target.dataset.f) return;
  filter = e.target.dataset.f;
  document.querySelectorAll("#filters button").forEach(b =>
    b.classList.toggle("on", b === e.target));
  render();
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closeDrawer(); });

async function tick() {
  try {
    data = await (await fetch("/data")).json();
    document.getElementById("status").textContent = "live";
    render();
  } catch (err) {
    document.getElementById("status").textContent = "viewer offline?";
  }
}
tick();
setInterval(tick, 2000);
</script>
</body>
</html>
