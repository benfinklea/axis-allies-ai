<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Axis &amp; Allies — Game Board</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --ink: #e8e2d0; --dim: #9a937f; --panel: #1d1a14; --line: #3a342a;
    --gold: #d8b04a; --ocean: #2b5876; --paper: #d9c9a3;
    --germany: #7e8896; --japan: #d9883a; --uk: #b89968;
    --ussr: #b34a3e; --usa: #6f8f4f; --neutral: #b9ad8d;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: #15120c; color: var(--ink);
         font: 13px/1.4 Georgia, "Times New Roman", serif; }
  #bar { display: flex; gap: 14px; align-items: center; padding: 9px 18px;
         background: linear-gradient(180deg, #241f15, #1a160e);
         border-bottom: 2px solid #4a3f28; position: sticky; top: 0;
         z-index: 5; flex-wrap: wrap; }
  #bar .big { font-weight: 700; font-size: 17px; letter-spacing: .12em;
              color: var(--gold); }
  #bar a { color: var(--gold); }
  #bar select, #bar button { background: var(--panel); color: var(--ink);
        border: 1px solid var(--line); border-radius: 6px; padding: 5px 10px;
        font: 12px Georgia, serif; cursor: pointer; max-width: 330px; }
  #legend { display: flex; gap: 12px; font-size: 12px; }
  #legend b { text-transform: capitalize; font-weight: 600; }
  #frame { padding: 14px; }
  #boardwrap { position: relative; width: 100%; aspect-ratio: 2 / 1;
        min-height: 520px; border: 14px solid #2e2718; border-radius: 6px;
        box-shadow: inset 0 0 0 2px #4a3f28, inset 0 0 60px rgba(0,0,0,.55),
                    0 10px 40px rgba(0,0,0,.6);
        background:
          radial-gradient(1400px 700px at 50% 30%,
                          rgba(110,160,190,.14) 0%, transparent 60%),
          repeating-linear-gradient(0deg, transparent 0 23px,
                          rgba(160,200,225,.05) 23px 24px),
          repeating-linear-gradient(90deg, transparent 0 23px,
                          rgba(160,200,225,.05) 23px 24px),
          linear-gradient(180deg, #356285 0%, #2b5876 45%, #1f4259 100%);
        overflow: hidden; }
  #map { position: absolute; inset: 0; width: 100%; height: 100%; }
  #map polygon { fill: url(#land); stroke: #8a7748; stroke-width: .14;
                 filter: drop-shadow(.18px .3px .25px rgba(0,0,0,.5)); }
  .t { position: absolute; transform: translate(-50%, -50%);
       text-align: center; cursor: default; z-index: 2; }
  .t .tile { display: inline-block; border-radius: 3px; padding: 0 4px 1px;
       background: rgba(246, 238, 214, .78);
       border: 1px solid rgba(46, 36, 18, .45);
       box-shadow: 0 1px 2px rgba(0,0,0,.35); }
  .t.sea .tile { background: rgba(16, 42, 60, .55); border: 1px solid
       rgba(190, 215, 235, .4); border-radius: 10px; }
  .t.sea:not(.occupied) { display: none; }
  .t.contested .tile { outline: 2px solid var(--gold);
       box-shadow: 0 0 16px rgba(216,176,74,.65); }
  .t .nm { font-size: 8.6px; font-weight: 700; letter-spacing: .02em;
       color: #241f12; white-space: nowrap; max-width: 120px;
       overflow: hidden; text-overflow: ellipsis; }
  .t.sea .nm { color: #cfe2ef; font-weight: 600; }
  .t .ipc { display: inline-block; font-size: 7.5px; color: #241f12;
       opacity: .75; margin-left: 3px; font-weight: 700; }
  .t .us { font-size: 12.5px; line-height: 1.15; white-space: nowrap;
       text-shadow: 0 1px 2px rgba(0,0,0,.6); }
  .t .us .ct { font-size: 9.5px; vertical-align: top; font-weight: 800;
       color: #fff; }
  .t .cap { position: absolute; top: -9px; right: -7px; font-size: 12px;
       filter: drop-shadow(0 1px 1px rgba(0,0,0,.7)); }
  .t:hover { z-index: 9; }
  .t .pop { display: none; position: absolute; left: 50%; top: 108%;
       transform: translateX(-50%); background: #241f15; color: var(--ink);
       border: 1px solid var(--gold); border-radius: 6px; padding: 8px 11px;
       z-index: 10; white-space: nowrap; text-align: left; font-size: 12px;
       box-shadow: 0 8px 24px rgba(0,0,0,.7); }
  .t:hover .pop { display: block; }
  #title { position: absolute; bottom: 6px; left: 50%;
       transform: translateX(-50%); font-size: 15px; letter-spacing: .5em;
       color: rgba(216,176,74,.5); font-weight: 700; z-index: 1; }
  #foot { padding: 8px 18px 16px; color: var(--dim); font-size: 12px; }
  #foot code { color: var(--gold); }
</style>
</head>
<body>
<div id="bar">
  <span class="big">AXIS &amp; ALLIES</span>
  <span id="round"></span>
  <select id="snapsel" onchange="loadSnap()">
    <option value="">● LIVE game</option>
  </select>
  <button onclick="step(-1)">⏪</button>
  <button onclick="step(1)">⏩</button>
  <span id="legend"></span>
  <a href="/" style="margin-left:auto">war room →</a>
</div>
<div id="frame"><div id="boardwrap">
  <svg id="map" viewBox="0 0 100 50" preserveAspectRatio="none">
    <defs>
      <linearGradient id="land" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#e3d4ad"/>
        <stop offset="1" stop-color="#c9b485"/>
      </linearGradient>
    </defs>
    <g id="continents"></g>
  </svg>
  <canvas id="terrmap" style="position:absolute; inset:0; width:100%;
          height:100%;"></canvas>
  <div id="title">SPRING 1942</div>
  <div id="pieces"></div>
</div></div>
<div id="foot">Hover any space for the full stack. Sea zones appear when
occupied. <code>python3 simulate.py</code> runs fast games — pick their
snapshots above to replay turn by turn.</div>
<script>
const COLORS = {germany:"var(--germany)", japan:"var(--japan)", uk:"var(--uk)",
                ussr:"var(--ussr)", usa:"var(--usa)"};
const FLAGS  = {germany:"🇩🇪", japan:"🇯🇵", uk:"🇬🇧", ussr:"☭", usa:"🇺🇸"};
const UICON  = {infantry:"🪖", armour:"🛡️", fighter:"🛩️", bomber:"✈️",
                aaGun:"🎯", factory:"🏭", transport:"🚢", submarine:"🔱",
                carrier:"🛳️", battleship:"⚓"};

// Same projection as tools/gen_board_layout.py (split mid-Atlantic).
const px = lon => ((lon + 30 + 720) % 360) / 3.6;
const py = lat => Math.max(2, Math.min(98, (90 - lat) / 1.65 - 8));

// Stylized continent coastlines (lat, lon) — east Siberia uses lon > 180
// to stay continuous across the dateline.
const CONTINENTS = [
  // Eurasia
  [[71,25],[70,45],[76,68],[77,104],[73,113],[71,135],[70,160],[66,190],
   [62,189],[60,170],[57,163],[60,156],[51,143],[46,138],[42,131],[39,127],
   [37,123],[34,120],[28,121],[22,114],[16,108],[9,105],[1,103],[8,98],
   [16,94],[22,91],[16,82],[8,77],[19,72],[24,66],[25,57],[26,51],[29,48],
   [24,52],[22,59],[18,56],[13,45],[15,42],[28,34],[31,33],[36,36],[36,30],
   [40,26],[38,22],[36,15],[40,18],[44,13],[43,7],[41,3],[38,0],[36,-5],
   [40,-9],[43,-9],[46,-2],[48,-5],[49,0],[51,2],[53,6],[56,8],[55,10],
   [58,11],[63,18],[60,17],[63,21],[60,28],[66,24],[70,19],[71,25]],
  // Africa
  [[35,-6],[36,3],[33,11],[32,20],[31,32],[27,34],[15,40],[11,43],[11,51],
   [0,42],[-15,40],[-26,33],[-34,19],[-30,16],[-18,12],[-6,12],[4,9],[6,3],
   [4,-8],[12,-17],[15,-17],[21,-17],[28,-13],[33,-9],[35,-6]],
  // North America
  [[71,-156],[68,-166],[60,-166],[55,-161],[58,-152],[59,-139],[54,-131],
   [48,-125],[40,-124],[33,-118],[23,-110],[27,-114],[31,-115],[23,-106],
   [16,-95],[13,-87],[8,-81],[9,-77],[11,-84],[16,-88],[21,-87],[22,-98],
   [26,-97],[29,-90],[26,-81],[31,-81],[35,-76],[40,-74],[42,-70],[45,-66],
   [44,-69],[47,-60],[47,-53],[52,-56],[55,-60],[58,-65],[62,-78],[66,-82],
   [70,-86],[73,-96],[72,-118],[70,-130],[71,-156]],
  // South America
  [[9,-77],[4,-78],[-4,-81],[-14,-76],[-21,-70],[-33,-72],[-44,-73],
   [-53,-72],[-55,-68],[-51,-67],[-45,-65],[-39,-62],[-34,-57],[-30,-50],
   [-24,-46],[-21,-40],[-13,-38],[-7,-34],[-3,-40],[0,-50],[5,-52],[8,-60],
   [10,-64],[12,-71],[9,-77]],
  // Greenland
  [[83,-34],[78,-20],[70,-22],[65,-37],[60,-43],[64,-51],[71,-55],[76,-67],
   [80,-62],[83,-34]],
  // Great Britain + Ireland
  [[58.6,-3.1],[57,-2],[54,0.4],[52.8,1.6],[51,1.3],[50.5,-3.6],[51.5,-4.8],
   [53.3,-4.4],[54.8,-5],[56.5,-6],[58.6,-3.1]],
  [[55.2,-7.3],[53.5,-6],[51.6,-8.5],[52.2,-10.3],[54.2,-10],[55.2,-7.3]],
  // Scandinavia is in Eurasia; Japan:
  [[45.4,141.7],[43,145.5],[41.5,141],[38,141.5],[34.8,140.3],[33.5,135.5],
   [31,130.8],[33,129.5],[35.5,132.5],[39,139.8],[42,139.9],[45.4,141.7]],
  // Sumatra / Java / Borneo / Sulawesi-ish / New Guinea / Philippines
  [[5.5,95.2],[-1,100.5],[-5.8,105.5],[-3,106],[2,99.5],[5.5,95.2]],
  [[-6.1,105.8],[-6.8,110.5],[-7.7,114.4],[-8.7,114],[-7.4,107],[-6.1,105.8]],
  [[6.9,117],[1,119],[-3.5,115.5],[-1.5,109.5],[2.1,109.3],[6.9,117]],
  [[-0.8,131.2],[-2.6,140.8],[-6.9,146.9],[-9.2,143.2],[-8,138.5],
   [-4.6,133],[-0.8,131.2]],
  [[18.4,121.2],[16,121.8],[13.5,123.8],[9.5,125.8],[6.2,125.5],[7.5,122],
   [12,121],[15.5,120],[18.4,121.2]],
  // Australia / New Zealand / Madagascar
  [[-11,131.5],[-12.3,136.5],[-15,140.8],[-10.9,142.5],[-19,147],
   [-25.5,153],[-32.5,152.5],[-37.8,149.7],[-38.5,141],[-35,136.7],
   [-32,133.5],[-33.5,124],[-31.5,115.5],[-26,113.5],[-21.5,114],
   [-17,122.3],[-13.7,126.7],[-11,131.5]],
  [[-34.5,173],[-37.7,178.3],[-41.3,175.5],[-44,172.7],[-46.5,169],
   [-44.5,167.5],[-40.5,172.6],[-34.5,173]],
  [[-12,49.3],[-16.1,50.3],[-22.3,48],[-25.5,45.2],[-22,43.3],[-16,44.4],
   [-12,49.3]],
  // Cuba + Iceland-ish dot for flavor
  [[23.2,-82.3],[21.5,-77.5],[20,-74.2],[21,-78.5],[22.6,-83.7],[23.2,-82.3]],
];

function drawContinents() {
  const g = document.getElementById("continents");
  g.innerHTML = CONTINENTS.map(poly => {
    const pts = poly.map(([lat, lon]) =>
      `${px(lon).toFixed(2)},${(py(lat) / 2).toFixed(2)}`).join(" ");
    return `<polygon points="${pts}"/>`;
  }).join("");
}

// ── territory regions: partition each landmass among its territories and
// color by current owner, with drawn borders — the printed-board look ──
const TW = 1000, TH = 500;
let landMask = null, idxLand = null, idxSea = null, seedNames = [];
let paintSig = null;

function buildIndexMap() {
  const cv = document.createElement("canvas");
  cv.width = TW; cv.height = TH;
  const cx = cv.getContext("2d");
  cx.fillStyle = "#fff";
  for (const poly of CONTINENTS) {
    cx.beginPath();
    poly.forEach(([lat, lon], i) => {
      const X = px(lon) * TW / 100, Y = py(lat) * TH / 100;
      i ? cx.lineTo(X, Y) : cx.moveTo(X, Y);
    });
    cx.closePath(); cx.fill();
  }
  const a = cx.getImageData(0, 0, TW, TH).data;
  landMask = new Uint8Array(TW * TH);
  for (let i = 0; i < TW * TH; i++) landMask[i] = a[i * 4 + 3] > 127 ? 1 : 0;

  const landSeeds = [], seaSeeds = [];
  seedNames = [];
  for (const [name, pos] of Object.entries(layout)) {
    const s = {x: pos[0] * TW / 100, y: pos[1] * TH / 100,
               i: seedNames.length};
    seedNames.push(name);
    (name.endsWith("Sea Zone") ? seaSeeds : landSeeds).push(s);
  }
  idxLand = new Int16Array(TW * TH).fill(-1);
  idxSea = new Int16Array(TW * TH).fill(-1);
  for (let y = 0; y < TH; y++) {
    for (let x = 0; x < TW; x++) {
      const o = y * TW + x;
      const seeds = landMask[o] ? landSeeds : seaSeeds;
      let best = -1, bd = Infinity;
      for (const s of seeds) {
        const dx = s.x - x, dy = s.y - y, d = dx * dx + dy * dy;
        if (d < bd) { bd = d; best = s.i; }
      }
      (landMask[o] ? idxLand : idxSea)[o] = best;
    }
  }
}

const RGB = {germany: [126, 136, 150], japan: [222, 138, 56],
             uk: [186, 154, 102], ussr: [184, 76, 62], usa: [112, 146, 78],
             neutral: [186, 174, 142]};

function paintTerritories(d) {
  const owner = {};
  d.territories.forEach(t => { owner[t.name] = t.owner; });
  const sig = JSON.stringify(owner);
  if (sig === paintSig || !idxLand) return;
  paintSig = sig;
  const pal = seedNames.map(n => RGB[owner[n]] || RGB.neutral);
  const cv = document.getElementById("terrmap");
  cv.width = TW; cv.height = TH;
  const cx = cv.getContext("2d");
  const img = cx.createImageData(TW, TH);
  const D = img.data, N = TW * TH;
  for (let o = 0; o < N; o++) {
    const p = o * 4;
    const nb = [o - 1, o + 1, o - TW, o + TW];
    if (landMask[o]) {
      const idx = idxLand[o];
      let border = false, coast = false;
      for (const q of nb) {
        if (q < 0 || q >= N) continue;
        if (!landMask[q]) coast = true;
        else if (idxLand[q] !== idx) border = true;
      }
      if (coast) { D[p] = 56; D[p + 1] = 46; D[p + 2] = 28; D[p + 3] = 255; }
      else if (border) { D[p] = 96; D[p + 1] = 80; D[p + 2] = 50;
                         D[p + 3] = 230; }
      else {
        const c = pal[idx];  // owner color washed toward parchment
        D[p] = (c[0] * 0.58 + 224 * 0.42) | 0;
        D[p + 1] = (c[1] * 0.58 + 208 * 0.42) | 0;
        D[p + 2] = (c[2] * 0.58 + 172 * 0.42) | 0;
        D[p + 3] = 255;
      }
    } else {
      const idx = idxSea[o];
      let border = false;
      for (const q of nb)
        if (q >= 0 && q < N && !landMask[q] && idxSea[q] !== idx)
          border = true;
      if (border) { D[p] = 165; D[p + 1] = 198; D[p + 2] = 222;
                    D[p + 3] = 48; }
      else D[p + 3] = 0;  // transparent — the deep-sea board shows through
    }
  }
  cx.putImageData(img, 0, 0);
}

let layout = null, snaps = [];
document.getElementById("legend").innerHTML =
  Object.entries(FLAGS).map(([p, f]) =>
    `<span>${f} <b style="color:${COLORS[p]}">${p}</b></span>`).join("");

async function init() {
  drawContinents();
  layout = await (await fetch("/layout")).json();
  buildIndexMap();
  await refreshSnaps();
  tick();
  setInterval(() => { if (!sel().value) tick(); }, 3000);
}
const sel = () => document.getElementById("snapsel");

async function refreshSnaps() {
  snaps = await (await fetch("/snapshots")).json();
  const cur = sel().value;
  sel().innerHTML = `<option value="">● LIVE game</option>` +
    snaps.map(s => `<option value="${s}">${s}</option>`).join("");
  sel().value = cur && snaps.includes(cur) ? cur : "";
}

function step(dir) {
  const i = snaps.indexOf(sel().value);
  const next = i === -1 ? (dir > 0 ? 0 : snaps.length - 1) : i + dir;
  sel().value = (next < 0 || next >= snaps.length) ? "" : snaps[next];
  tick();
}
async function loadSnap() { tick(); }

async function tick() {
  const q = sel().value ? `?snapshot=${encodeURIComponent(sel().value)}` : "";
  const d = await (await fetch("/data" + q)).json();
  if (!d.powers) return;
  document.getElementById("round").textContent = sel().value
    ? `replay: ${sel().value.split("/").slice(-1)[0].replace(".json", "")}`
    : `Round ${d.round} — ${String(d.turn).toUpperCase()} (${d.phase})`;
  render(d);
}

function render(d) {
  paintTerritories(d);
  const caps = {};
  d.powers.forEach(p => caps[p.capital] = p.power);
  document.getElementById("pieces").innerHTML = d.territories.map(t => {
    const pos = layout[t.name];
    if (!pos) return "";
    const occupied = Object.keys(t.units).length > 0;
    const stacks = Object.entries(t.units).map(([p, us]) =>
      `<div class="us" style="color:${COLORS[p]}">` +
      Object.entries(us).map(([u, n]) =>
        `${UICON[u] || "▪"}<span class="ct">${n > 1 ? n : ""}</span>`)
        .join("") + `</div>`).join("");
    const pop = `<div class="pop"><b>${esc(t.name)}</b>` +
      (t.owner ? ` — ${FLAGS[t.owner] || ""} ${t.owner}` : "") +
      (t.ipc ? ` · ${t.ipc} IPC` : "") +
      Object.entries(t.units).map(([p, us]) =>
        `<div style="color:${COLORS[p]}">${FLAGS[p] || ""} ${p}: ` +
        Object.entries(us).map(([u, n]) => `${n} ${u}`).join(", ") +
        `</div>`).join("") + `</div>`;
    return `<div class="t ${t.water ? "sea" : "land"}
                 ${occupied ? "occupied" : ""} ${t.contested ? "contested" : ""}"
                 style="left:${pos[0]}%; top:${pos[1]}%;
                        --oc:${COLORS[t.owner] || "var(--neutral)"}">
        ${caps[t.name] ? `<span class="cap">⭐</span>` : ""}
        <div class="tile"><span class="nm">${esc(short(t.name))}</span>${
          t.ipc && !t.water ? `<span class="ipc">${t.ipc}</span>` : ""}</div>
        ${stacks}${pop}</div>`;
  }).join("");
}

const short = n => n.replace(" Sea Zone", "").replace(" S.S.R.", "");
const esc = s => String(s ?? "").replace(/[&<>"]/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
init();
</script>
</body>
</html>
